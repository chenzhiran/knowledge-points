<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程小英雄挑战赛 - 循环与结构篇</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        /* --- 基础设置 --- */
        :root {
            --primary-color: #0984e3; 
            --secondary-color: #74b9ff;
            --bg-color: #DFE6E9;     
            --card-bg: #FFFFFF;
            --text-color: #2d3436;   
            --en-text-color: #636e72; 
            --correct-color: #00b894;
            --wrong-color: #d63031;  
            --accent-yellow: #fdcb6e;
        }

        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#b2bec3 10%, transparent 10%);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* --- 游戏容器 (扩大区域以完整展示一题) --- */
        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 900px; 
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px 50px;
            text-align: center;
            position: relative;
            border: 4px solid var(--secondary-color);
            overflow: hidden; 
        }

        /* --- 顶部状态栏 --- */
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .score-box {
            background: var(--accent-yellow);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 0 #e1b12c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- 进度条 --- */
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 35px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- 题目区域 --- */
        .question-area {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .question-title {
            color: var(--text-color);
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* 英文文本专用样式 */
        .en-text {
            display: block;
            font-size: 1.05rem;
            color: var(--en-text-color);
            margin-bottom: 15px;
            font-weight: normal;
            line-height: 1.5;
        }

        /* --- 题目中程序(代码)的专属样式：背景色、幼圆字体、加粗 --- */
        .question-title code, .en-text code {
            background-color: #f1f2f6; 
            font-family: 'YouYuan', '幼圆', monospace; 
            font-weight: bold; 
            color: var(--primary-color); 
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 1.15rem;
            margin: 0 2px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        /* --- 选项按钮 (改为垂直排列以适应中英双语) --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #ecf0f1;
            padding: 15px 25px;
            border-radius: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: var(--text-color);
            text-align: left;
            position: relative;
            top: 0;
            box-shadow: 0 5px 0 #bdc3c7;
            display: flex;
            flex-direction: column; 
            gap: 4px;
        }

        .opt-zh {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .opt-en {
            font-size: 0.95rem;
            color: var(--en-text-color);
            font-weight: normal;
        }

        /* 选项中的代码区域：支持多行换行 */
        .option-code {
            font-family: 'Fira Code', 'YouYuan', '幼圆', monospace;
            background: #f8f9fa;
            color: #0984e3;
            font-weight: bold;
            padding: 12px;
            border-radius: 8px;
            margin-top: 8px;
            width: 100%;
            border: 1px solid #dfe6e9;
            white-space: pre-wrap; /* 关键修改：支持多行程序正确换行 */
            line-height: 1.5;
            box-sizing: border-box;
            text-align: left;
            font-size: 1.1rem;
        }

        .option-btn.correct .opt-en, .option-btn.wrong .opt-en {
            color: rgba(255,255,255,0.85); 
        }
        .option-btn.correct .option-code, .option-btn.wrong .option-code {
            background: rgba(255,255,255,0.2);
            border-color: transparent;
            color: white;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #aab0b3;
        }

        .option-btn:active:not([disabled]) {
            top: 5px;
            box-shadow: 0 0 0 #bdc3c7;
        }
        
        .option-btn[disabled] {
            cursor: default;
        }

        /* --- 答题状态 --- */
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
            box-shadow: 0 5px 0 #00965e;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color);
            color: white;
            border-color: var(--wrong-color);
            box-shadow: 0 5px 0 #c0392b;
            animation: shake 0.5s;
        }

        /* --- 解析区域 --- */
        .feedback-section {
            display: none; 
            text-align: left;
            background: #f1f2f6;
            padding: 25px;
            border-radius: 18px;
            margin-top: 30px;
            border-left: 6px solid;
            animation: slideUp 0.4s ease-out;
        }
        .feedback-section.correct { border-color: var(--correct-color); }
        .feedback-section.wrong { border-color: var(--wrong-color); }

        .feedback-title {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .correct .feedback-title { color: var(--correct-color); }
        .wrong .feedback-title { color: var(--wrong-color); }

        .explanation-text {
            color: #2d3436;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        /* --- 下一题按钮 --- */
        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #0652dd;
            transition: all 0.2s;
            float: right; 
        }
        .next-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .next-btn:active { transform: translateY(5px); box-shadow: none; }

        /* --- 结算画面 --- */
        .end-screen {
            display: none;
            padding: 20px 0;
        }
        .end-title { font-size: 2.2rem; color: var(--primary-color); margin-bottom: 10px; }
        .end-score-box {
            background: var(--accent-yellow);
            color: white;
            padding: 20px 40px;
            border-radius: 25px;
            display: inline-block;
            margin: 30px 0;
            box-shadow: 0 8px 0 #e1b12c;
        }
        .end-score { font-size: 3.5rem; font-weight: bold; line-height: 1; }
        .end-desc { color: #636e72; font-size: 1.1rem; margin-bottom: 30px; }
        
        .perfect-score-text {
            background: linear-gradient(45deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* --- 动画定义 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .confetti {
            position: absolute;
            width: 12px; height: 12px;
            background-color: #f00;
            border-radius: 3px;
            animation: fall linear forwards;
            z-index: 10;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-view">
            <div class="header-stats">
                <span id="level-indicator">Level 1 / 20</span>
                <div class="score-box">⭐ <span id="score">0</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="question-area" id="question-container">
            </div>

            <div class="options-grid" id="options-container">
            </div>

            <div class="feedback-section" id="feedback-area">
                <div class="feedback-title" id="feedback-title"></div>
                <div class="explanation-text" id="explanation-text"></div>
                <div style="overflow: hidden;"> 
                    <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
                </div>
            </div>
        </div>

        <div id="end-screen" class="end-screen">
        </div>
    </div>

    <script>
        // --- 题目数据 ---
        const quizData = [
            {
                qZh: "1. 以下哪一项是引入循环结构最主要的原因？",
                qEn: "What is the main reason for introducing loop structures?",
                options: [
                    { zh: "A. 让代码看起来更复杂", en: "To make the code look more complex" },
                    { zh: "B. 避免重复编写相同的代码，提高效率", en: "To avoid writing the same code repeatedly and improve efficiency" },
                    { zh: "C. 增加程序的运行时间", en: "To increase the program's running time" },
                    { zh: "D. 减少程序中对象的数量", en: "To reduce the number of objects in the program" }
                ],
                correct: 1, 
                descZh: "解析：循环的核心目的是减少代码重复，让一段代码能被重复执行多次，从而提高编程效率和代码可维护性，遵循 DRY（Don't Repeat Yourself）原则。",
                descEn: "Explanation: The core purpose of loops is to reduce code duplication, allowing a block of code to run multiple times, thereby improving efficiency and following the DRY principle."
            },
            {
                qZh: "2. 在 `while True:` 循环中，关键字 `while` 的含义是什么？",
                qEn: "In a `while True:` loop, what does the keyword `while` mean?",
                options: [
                    { zh: "A. 当……的时候", en: "When..." },
                    { zh: "B. 直到……为止", en: "Until..." },
                    { zh: "C. 执行一次", en: "Execute once" },
                    { zh: "D. 定义函数", en: "Define function" }
                ],
                correct: 0,
                descZh: "解析：`while` 在 Python 中表示“当……的时候”，即只要后面的条件为真，就重复执行循环体中的代码。",
                descEn: "Explanation: `while` in Python means 'as long as'. As long as the condition following it is true, the code inside the loop body will be repeatedly executed."
            },
            {
                qZh: "3. `while True:` 语句末尾的冒号 `:` 有什么作用？",
                qEn: "What is the purpose of the colon `:` at the end of the `while True:` statement?",
                options: [
                    { zh: "A. 表示一行代码的结束", en: "It indicates the end of a line of code" },
                    { zh: "B. 标志着下方将开始一个新的代码块", en: "It marks the beginning of a new code block below" },
                    { zh: "C. 是一个拼写错误，没有实际作用", en: "It is a typo and has no real function" },
                    { zh: "D. 用于分隔参数", en: "It is used to separate arguments" }
                ],
                correct: 1,
                descZh: "解析：冒号在 Python 中用于声明语句（如 `while`、`if`、`for`）的结束，并告诉解释器接下来的缩进行属于一个新的代码块。",
                descEn: "Explanation: The colon in Python is used to end a statement like `while`, `if`, or `for`, telling the interpreter that the indented lines below belong to a new code block."
            },
            {
                qZh: "4. 在 Python 中，`True` 属于哪种数据类型？",
                qEn: "In Python, what data type does `True` belong to?",
                options: [
                    { zh: "A. 整数", en: "Integer" },
                    { zh: "B. 字符串", en: "String" },
                    { zh: "C. 布尔值", en: "Boolean" },
                    { zh: "D. 列表", en: "List" }
                ],
                correct: 2,
                descZh: "解析：`True` 是布尔类型（`bool`）的值，布尔类型只有两个值：`True` 和 `False`，分别代表真和假。",
                descEn: "Explanation: `True` is a value of the boolean data type (`bool`), which only has two possible values: `True` and `False`."
            },
            {
                qZh: "5. 在 `while True:` 循环中，循环体内的代码必须如何书写？",
                qEn: "How must the code inside a `while True:` loop be written?",
                options: [
                    { zh: "A. 顶格书写", en: "Without indentation" },
                    { zh: "B. 用方括号括起来", en: "Enclosed in square brackets" },
                    { zh: "C. 保持一致的缩进（通常为4个空格）", en: "With consistent indentation (usually 4 spaces)" },
                    { zh: "D. 用花括号括起来", en: "Enclosed in curly braces" }
                ],
                correct: 2,
                descZh: "解析：Python 使用缩进来标识代码块。循环体中的所有语句必须保持相同的缩进层级，通常是 4 个空格。",
                descEn: "Explanation: Python uses indentation to define code blocks. All statements within a loop body must have the exact same level of indentation, typically 4 spaces."
            },
            {
                qZh: "6. 以下哪段代码正确地使用了 `while True` 循环让英雄不断左右移动？",
                qEn: "Which code snippet correctly uses a `while True` loop to make the hero move right and left continuously?",
                options: [
                    { zh: "A.", en: "", code: "while True:\nhero.moveRight()\nhero.moveLeft()" },
                    { zh: "B.", en: "", code: "while True\n    hero.moveRight()\n    hero.moveLeft()" },
                    { zh: "C.", en: "", code: "while True:\n    hero.moveRight()\n    hero.moveLeft()" },
                    { zh: "D.", en: "", code: "while True:\nhero.moveRight()\n    hero.moveLeft()" }
                ],
                correct: 2,
                descZh: "解析：选项 A 缺少缩进，选项 B 缺少冒号，选项 D 缩进不一致。选项 C 的语法和缩进均正确。",
                descEn: "Explanation: Option A lacks indentation, B is missing the colon, and D has inconsistent indentation. Option C has correct syntax and indentation."
            },
            {
                qZh: "7. 以下哪行关于 `真` 的写法是正确的？",
                qEn: "Which of the following spellings of `True` is correct?",
                options: [
                    { zh: "A.", en: "", code: "true" },
                    { zh: "B.", en: "", code: "TRUE" },
                    { zh: "C.", en: "", code: "True" },
                    { zh: "D.", en: "", code: "Tru" }
                ],
                correct: 2,
                descZh: "解析：Python 中的布尔值 `True` 是大小写敏感的，必须首字母大写，其余字母小写。`true` 或 `TRUE` 都会导致 `NameError`。",
                descEn: "Explanation: The boolean value `True` in Python is case-sensitive. It must start with a capital 'T' followed by lowercase letters."
            },
            {
                qZh: "8. 在 `while True:` 循环之前放置的代码有什么特点？",
                qEn: "What is the characteristic of code placed before a `while True:` loop?",
                options: [
                    { zh: "A. 它永远不会被执行", en: "It is never executed" },
                    { zh: "B. 它会和循环体一起被无限重复执行", en: "It is repeated infinitely along with the loop body" },
                    { zh: "C. 它只会在循环开始前执行一次", en: "It executes only once, before the loop starts" },
                    { zh: "D. 它会在每次循环结束后执行一次", en: "It executes once after each loop iteration ends" }
                ],
                correct: 2,
                descZh: "解析：循环前的代码（不缩进）是初始化操作，按顺序只执行一次，用于完成准备动作，然后程序进入无限循环。",
                descEn: "Explanation: Code before the loop (unindented) runs sequentially only once for setup/initialization. After that, the program enters the infinite loop."
            },
            {
                qZh: "9. 以下哪一项最适合放在 `while True:` 循环的内部？",
                qEn: "Which of the following is most suitable to be placed inside a `while True:` loop?",
                options: [
                    { zh: "A. 只需要执行一次的攻击动作", en: "An attack action that only needs to be performed once" },
                    { zh: "B. 英雄的初始化对话", en: "The hero's initialization dialogue" },
                    { zh: "C. 需要持续重复执行的移动巡逻模式", en: "A movement patrol pattern that needs to be continuously repeated" },
                    { zh: "D. 加载地图资源", en: "Loading map resources" }
                ],
                correct: 2,
                descZh: "解析：需要重复执行的动作（如巡逻、持续攻击大门）应该放在循环内部。一次性操作应放在循环之前。",
                descEn: "Explanation: Actions that require continuous repetition (like patrolling or continuously attacking) belong inside the loop. One-time tasks go outside."
            },
            {
                qZh: "10. 在第17关“恐惧之门”中，使用 `while True: hero.attack(\"Door\")` 的优势是什么？",
                qEn: "What is the advantage of using `while True: hero.attack(\"Door\")` in the level \"Fearful Door\"?",
                options: [
                    { zh: "A. 攻击力会随着循环次数增加", en: "The attack power increases with each loop" },
                    { zh: "B. 门需要被攻击很多次，最终才会被打破", en: "The door will eventually be destroyed no matter how many attacks it takes" },
                    { zh: "C. 英雄可以同时攻击多个目标", en: "The hero can attack multiple targets simultaneously" },
                    { zh: "D. 代码会自动收集宝石", en: "The code will automatically collect gems" }
                ],
                correct: 1,
                descZh: "解析：当不知道需要攻击多少次时，无限循环是最佳选择。它会持续攻击直到目标被摧毁，无需手动计算攻击次数。",
                descEn: "Explanation: When the exact number of required attacks is unknown, an infinite loop is ideal. It guarantees the target is attacked until destroyed without manual counting."
            },
            {
                qZh: "11. 如果在 `while True:` 循环体内的代码缩进不一致，会发生什么？",
                qEn: "What happens if the code inside a `while True:` loop has inconsistent indentation?",
                options: [
                    { zh: "A. 程序会正常运行", en: "The program runs normally" },
                    { zh: "B. Python 会忽略缩进错误", en: "Python ignores indentation errors" },
                    { zh: "C. 会引发 `IndentationError`", en: "It will raise an `IndentationError`" },
                    { zh: "D. 循环会自动修复缩进", en: "The loop will auto-fix the indentation" }
                ],
                correct: 2,
                descZh: "解析：Python 对缩进要求严格，同一代码块内的缩进层级必须完全一致，否则会引发 `IndentationError`。",
                descEn: "Explanation: Python strictly enforces indentation. Inconsistent indentation within the same code block will trigger an `IndentationError`."
            },
            {
                qZh: "12. 以下哪一项是 `while True:` 循环的典型应用场景？",
                qEn: "Which of the following is a typical application scenario for a `while True:` loop?",
                options: [
                    { zh: "A. 计算两个数的和", en: "Calculating the sum of two numbers" },
                    { zh: "B. 游戏的主循环，持续更新画面", en: "The main loop of a game, continuously updating the screen" },
                    { zh: "C. 定义一个变量", en: "Defining a variable" },
                    { zh: "D. 只执行一次的初始化操作", en: "A one-time initialization operation" }
                ],
                correct: 1,
                descZh: "解析：游戏引擎、服务器监听等需要持续运行、直到外部强制停止的程序，都使用无限循环作为其主循环。",
                descEn: "Explanation: Programs that need to run continuously until forcibly stopped externally, such as game engines or server listeners, use infinite loops as their main loop."
            },
            {
                qZh: "13. 识别地图中的重复路径模式（如“右-右-上-上”），并将其写入循环体，这个过程称为什么？",
                qEn: "What is the process of identifying a repeated path pattern (e.g., \"right-right-up-up\") on a map and writing it into the loop body called?",
                options: [
                    { zh: "A. 语法检查", en: "Syntax checking" },
                    { zh: "B. 变量赋值", en: "Variable assignment" },
                    { zh: "C. 模式识别", en: "Pattern recognition" },
                    { zh: "D. 数据类型转换", en: "Data type conversion" }
                ],
                correct: 2,
                descZh: "解析：模式识别是设计循环的关键步骤，即观察任务中反复出现的动作序列，将其定义为一个循环单元。",
                descEn: "Explanation: Pattern recognition is a crucial step in designing loops. It involves observing repetitive action sequences and defining them as a single loop unit."
            },
            {
                qZh: "14. 下面关于 `while True:` 循环的说法，哪一项是正确的？",
                qEn: "Which statement about the `while True:` loop is correct?",
                options: [
                    { zh: "A. 它会在执行10次后自动停止", en: "It stops automatically after 10 executions" },
                    { zh: "B. 只要不强制停止，它会永远执行下去", en: "It will run forever unless forcefully stopped" },
                    { zh: "C. 它只能用于移动命令", en: "It can only be used for movement commands" },
                    { zh: "D. 它不能包含超过2条语句", en: "It cannot contain more than 2 statements" }
                ],
                correct: 1,
                descZh: "解析：由于条件 `True` 永远为真，`while True:` 会创建一个无限循环，除非遇到 `break`、程序崩溃或被外部终止（如关卡结束）。",
                descEn: "Explanation: Because `True` is always true, `while True:` creates an infinite loop that runs forever unless a `break` is encountered, the program crashes, or it is externally terminated."
            },
            {
                qZh: "15. 在循环中组合使用 `hero.moveRight()` 和 `hero.moveDown()`，它们的执行顺序是？",
                qEn: "When combining `hero.moveRight()` and `hero.moveDown()` inside a loop, what is their execution order?",
                options: [
                    { zh: "A. 随机执行", en: "Random" },
                    { zh: "B. 同时执行", en: "Simultaneously" },
                    { zh: "C. 按照书写顺序从上到下依次执行", en: "Sequentially, from top to bottom in the order they are written" },
                    { zh: "D. 只执行第一句", en: "Only the first line executes" }
                ],
                correct: 2,
                descZh: "解析：循环体内的语句仍然遵循顺序结构，按照从上到下的顺序依次执行，每执行完一轮后再从头开始。",
                descEn: "Explanation: Statements within the loop body still follow sequential execution, running from top to bottom before starting the next round from the top."
            },
            {
                qZh: "16. 关于 Python 中的缩进，以下哪项描述是正确的？",
                qEn: "Which of the following describes indentation in Python correctly?",
                options: [
                    { zh: "A. 缩进只是为了美观，不影响程序逻辑", en: "Indentation is only for aesthetics and does not affect program logic" },
                    { zh: "B. Python 使用缩进来定义代码块，是语法要求", en: "Python uses indentation to define code blocks, which is a syntactic requirement" },
                    { zh: "C. Python 要求所有代码都必须缩进4个空格", en: "Python requires all code to be indented by 4 spaces" },
                    { zh: "D. 缩进只能用 Tab 键实现", en: "Indentation can only be done with the Tab key" }
                ],
                correct: 1,
                descZh: "解析：在 Python 中，缩进是语法的一部分，用于区分不同的代码块（如循环体）。顶格的代码表示不在循环内。",
                descEn: "Explanation: In Python, indentation is part of the syntax used to differentiate code blocks (like the contents of a loop). Unindented code means it is outside the block."
            },
            {
                qZh: "17. 在第18关“攻破突袭”中，英雄在循环前执行 `hero.attack(\"Chest\")` 打碎箱子，这行代码会执行几次？",
                qEn: "In the level \"Smash the Assault\", the hero executes `hero.attack(\"Chest\")` before the loop to break the chest. How many times does this line of code execute?",
                options: [
                    { zh: "A. 0次", en: "0 times" },
                    { zh: "B. 1次", en: "1 time" },
                    { zh: "C. 无限次", en: "Infinitely" },
                    { zh: "D. 2次", en: "2 times" }
                ],
                correct: 1,
                descZh: "解析：这行代码位于 `while True:` 循环之前，且没有缩进，属于初始化操作，因此在程序运行期间只会执行一次。",
                descEn: "Explanation: This code is located before the `while True:` loop and has no indentation, making it an initialization step that only runs once during execution."
            },
            {
                qZh: "18. 下列关于 `while True:` 循环的风险，描述正确的是？",
                qEn: "Which of the following correctly describes a risk of `while True:` loops?",
                options: [
                    { zh: "A. 会损坏计算机硬件", en: "It can damage computer hardware" },
                    { zh: "B. 在传统编程环境中，如果不加控制，会导致程序永不停止", en: "In traditional programming, it can cause the program to never stop if not controlled" },
                    { zh: "C. 它会自动删除其他代码", en: "It automatically deletes other code" },
                    { zh: "D. 英雄的生命值会不断减少", en: "The hero's health will continuously decrease" }
                ],
                correct: 1,
                descZh: "解析：在标准 Python 环境中，意外的无限循环会消耗 CPU 资源并使程序无响应，通常需要手动终止（如按 `Ctrl+C`）。",
                descEn: "Explanation: In standard Python environments, an unintended infinite loop consumes CPU resources and makes the program unresponsive until manually terminated."
            },
            {
                qZh: "19. 在 `while True:` 循环中，每执行一遍循环体被称为什么？",
                qEn: "In a `while True:` loop, what is each execution of the loop body called?",
                options: [
                    { zh: "A. 一个参数", en: "An argument" },
                    { zh: "B. 一个注释", en: "A comment" },
                    { zh: "C. 一次迭代", en: "One iteration" },
                    { zh: "D. 一个语法检查", en: "A syntax check" }
                ],
                correct: 2,
                descZh: "解析：循环的每一次完整执行过程被称为一次“迭代”（Iteration），这是计算机科学中的标准术语。",
                descEn: "Explanation: Each complete execution of the loop body is called an \"iteration\", which is standard terminology in computer science."
            },
            {
                qZh: "20. 下列哪项技能是使用循环后带来的直接好处？",
                qEn: "Which of the following is a direct benefit of using loops?",
                options: [
                    { zh: "A. 英雄移动速度加快", en: "The hero moves faster" },
                    { zh: "B. 游戏画面更清晰", en: "The game graphics become clearer" },
                    { zh: "C. 代码复用，减少总代码量", en: "Code reuse, reducing the total amount of code" },
                    { zh: "D. 敌人自动变弱", en: "Enemies automatically become weaker" }
                ],
                correct: 2,
                descZh: "解析：循环通过重复执行同一段代码，避免了大量重复代码的编写，实现了代码复用，使程序更短、更易于维护。",
                descEn: "Explanation: Loops allow the repetition of code blocks, avoiding the need to write redundant lines. This achieves code reuse, making programs shorter and easier to maintain."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false; 

        const quizView = document.getElementById('quiz-view');
        const endScreen = document.getElementById('end-screen');
        const questionContainer = document.getElementById('question-container');
        const optionsContainer = document.getElementById('options-container');
        const levelIndicator = document.getElementById('level-indicator');
        const scoreDisplay = document.getElementById('score');
        const progressBar = document.getElementById('progress-bar');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const explanationText = document.getElementById('explanation-text');

        // --- 纯净模式，直接转义HTML，不再用正则做容易出错的高亮 ---
        function highlightCode(codeStr) {
            if (!codeStr) return '';
            return escapeHtml(codeStr);
        }

        // --- 初始化题目 ---
        function loadQuestion() {
            answered = false; 
            feedbackArea.style.display = 'none'; 
            
            const data = quizData[currentQuestion];
            
            levelIndicator.innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
            progressBar.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            scoreDisplay.innerText = score;
            
            // 渲染题目 (中英文分行)
            let html = `
                <div class="question-title">${highlightDescCode(data.qZh)}</div>
                <div class="en-text">${highlightDescCode(data.qEn)}</div>
            `;
            questionContainer.innerHTML = html;
            
            // 渲染选项
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                
                let btnHtml = `<span class="opt-zh">${highlightDescCode(opt.zh)}</span>`;
                if (opt.en) {
                    btnHtml += `<span class="opt-en">${highlightDescCode(opt.en)}</span>`;
                }
                // 处理带代码的选项
                if (opt.code) {
                    btnHtml += `<div class="option-code">${highlightCode(opt.code)}</div>`;
                }

                btn.innerHTML = btnHtml;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // --- 检查答案 ---
        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return; 
            answered = true;

            const data = quizData[currentQuestion];
            const allBtns = optionsContainer.querySelectorAll('.option-btn');
            
            allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
            
            // 组装中英双语解析
            const fullDesc = `
                <div style="margin-bottom:8px;">${highlightDescCode(data.descZh)}</div>
                <div class="en-text">${highlightDescCode(data.descEn)}</div>
            `;

            if (selectedIndex === data.correct) {
                btnElement.classList.add('correct');
                score += 100; 
                scoreDisplay.innerText = score;
                createConfetti(); 
                showFeedback(true, "🎉 回答正确！ Correct!", fullDesc);
            } else {
                btnElement.classList.add('wrong');
                setTimeout(() => {
                   allBtns[data.correct].classList.add('correct');
                }, 400);
                
                const rightOptStr = String.fromCharCode(65 + data.correct); 
                showFeedback(false, `❌ 回答错误。正确答案是 / Correct answer is: ${rightOptStr}`, fullDesc);
            }
        }

        // --- 将文本中的反引号部分替换为带有背景色的幼圆加粗代码样式 ---
        function highlightDescCode(text) {
            return text.replace(/`([^`]+)`/g, '<code style="background-color:#f1f2f6; font-family:\'YouYuan\', \'幼圆\', monospace; font-weight:bold; color:#0984e3; padding:3px 8px; border-radius:6px; font-size:1.15rem; margin:0 2px;">$1</code>');
        }

        function showFeedback(isCorrect, title, desc) {
            feedbackArea.classList.remove('correct', 'wrong');
            feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
            feedbackTitle.innerHTML = title;
            explanationText.innerHTML = desc;
            feedbackArea.style.display = 'block';
            setTimeout(() => {
                feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            quizView.style.display = 'none';
            endScreen.style.display = 'block';
            progressBar.parentElement.style.display = 'none'; 

            const totalScore = quizData.length * 100;
            const isPerfect = (score === totalScore);
            
            let html = '';
            if (isPerfect) {
                for(let i=0; i<6; i++) setTimeout(createConfetti, i*350);
                html += `<div class="end-title">🎉 完美的编程小英雄！<br><span class="en-text" style="font-size: 1.2rem;">Perfect Programming Hero!</span>🎉</div>`;
                html += `<div class="end-score-box">总得分 Total Score<br><div class="end-score perfect-score-text">${score}</div></div>`;
                html += `<div class="end-desc">太棒了！你掌握了所有的知识点，简直是天才！<br><span class="en-text">Amazing! You've mastered all the concepts, you're a genius!</span></div>`;
            } else {
                html += `<div class="end-title">挑战完成！<br><span class="en-text" style="font-size: 1.2rem;">Challenge Completed!</span></div>`;
                html += `<div class="end-score-box">总得分 Total Score<br><div class="end-score">${score} / ${totalScore}</div></div>`;
                html += `<div class="end-desc">做得不错！继续加油，下次争取拿满分哦！<br><span class="en-text">Good job! Keep it up and aim for a perfect score next time!</span></div>`;
            }
            html += `<button class="next-btn" onclick="location.reload()" style="float:none; font-size:1.2rem; padding: 15px 40px; margin-top:20px;">🔄 再玩一次 Play Again</button>`;
            
            endScreen.innerHTML = html;
        }

        function createConfetti() {
            const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fdcb6e'];
            const container = document.querySelector('.game-container');
            for (let i = 0; i < 45; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                const scale = Math.random() * 0.6 + 0.4;
                confetti.style.transform = `scale(${scale}) rotate(${Math.random()*360}deg)`;
                confetti.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                container.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        loadQuestion();
    </script>
</body>
</html>
