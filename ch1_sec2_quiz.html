<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编程小英雄挑战赛 - Python 基础篇</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        /* --- 基础设置 --- */
        :root {
            --primary-color: #0984e3; 
            --secondary-color: #74b9ff;
            --bg-color: #DFE6E9;     
            --card-bg: #FFFFFF;
            --text-color: #2d3436;   
            --en-text-color: #636e72; 
            --correct-color: #00b894;
            --wrong-color: #d63031;  
            --accent-yellow: #fdcb6e;
        }

        body {
            font-family: 'Poppins', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#b2bec3 10%, transparent 10%);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* --- 游戏容器 --- */
        .game-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 900px; 
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 40px 50px;
            text-align: center;
            position: relative;
            border: 4px solid var(--secondary-color);
            overflow: hidden; 
        }

        /* --- 顶部状态栏 --- */
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .score-box {
            background: var(--accent-yellow);
            padding: 8px 20px;
            border-radius: 30px;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            box-shadow: 0 4px 0 #e1b12c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- 进度条 --- */
        .progress-container {
            width: 100%;
            height: 12px;
            background-color: #ecf0f1;
            border-radius: 10px;
            margin-bottom: 35px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* --- 题目区域 --- */
        .question-area {
            text-align: left;
            margin-bottom: 30px;
        }
        
        .question-title {
            color: var(--text-color);
            font-size: 1.4rem;
            line-height: 1.5;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .en-text {
            display: block;
            font-size: 1.05rem;
            color: var(--en-text-color);
            margin-bottom: 15px;
            font-weight: normal;
        }

        /* --- 选项按钮 --- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr; 
            gap: 15px;
        }

        .option-btn {
            background: white;
            border: 3px solid #ecf0f1;
            padding: 15px 25px;
            border-radius: 18px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: var(--text-color);
            text-align: left;
            position: relative;
            top: 0;
            box-shadow: 0 5px 0 #bdc3c7;
            display: flex;
            flex-direction: column; 
            gap: 4px;
        }

        .opt-zh {
            font-size: 1.15rem;
            font-weight: 600;
        }

        .opt-en {
            font-size: 0.95rem;
            color: var(--en-text-color);
            font-weight: normal;
        }

        /* 纯净代码区域 */
        .option-code {
            font-family: 'Fira Code', monospace;
            background: #f8f9fa;
            color: #2d3436;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            width: 100%;
            border: 1px solid #dfe6e9;
            white-space: pre-wrap; 
        }

        .option-btn.correct .opt-en, .option-btn.wrong .opt-en {
            color: rgba(255,255,255,0.85); 
        }
        .option-btn.correct .option-code, .option-btn.wrong .option-code {
            background: rgba(255,255,255,0.2);
            border-color: transparent;
            color: white;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #aab0b3;
        }

        .option-btn:active:not([disabled]) {
            top: 5px;
            box-shadow: 0 0 0 #bdc3c7;
        }
        
        .option-btn[disabled] {
            cursor: default;
        }

        /* --- 答题状态 --- */
        .option-btn.correct {
            background-color: var(--correct-color);
            color: white;
            border-color: var(--correct-color);
            box-shadow: 0 5px 0 #00965e;
        }

        .option-btn.wrong {
            background-color: var(--wrong-color);
            color: white;
            border-color: var(--wrong-color);
            box-shadow: 0 5px 0 #c0392b;
            animation: shake 0.5s;
        }

        /* --- 解析区域 --- */
        .feedback-section {
            display: none; 
            text-align: left;
            background: #f1f2f6;
            padding: 25px;
            border-radius: 18px;
            margin-top: 30px;
            border-left: 6px solid;
            animation: slideUp 0.4s ease-out;
        }
        .feedback-section.correct { border-color: var(--correct-color); }
        .feedback-section.wrong { border-color: var(--wrong-color); }

        .feedback-title {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .correct .feedback-title { color: var(--correct-color); }
        .wrong .feedback-title { color: var(--wrong-color); }

        .explanation-text {
            color: #2d3436;
            line-height: 1.6;
            font-size: 1.05rem;
        }

        /* --- 下一题按钮 --- */
        .next-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 0 #0652dd;
            transition: all 0.2s;
            float: right; 
        }
        .next-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .next-btn:active { transform: translateY(5px); box-shadow: none; }

        /* --- 结算画面 --- */
        .end-screen {
            display: none;
            padding: 20px 0;
        }
        .end-title { font-size: 2.2rem; color: var(--primary-color); margin-bottom: 10px; }
        .end-score-box {
            background: var(--accent-yellow);
            color: white;
            padding: 20px 40px;
            border-radius: 25px;
            display: inline-block;
            margin: 30px 0;
            box-shadow: 0 8px 0 #e1b12c;
        }
        .end-score { font-size: 3.5rem; font-weight: bold; line-height: 1; }
        .end-desc { color: #636e72; font-size: 1.1rem; margin-bottom: 30px; }
        
        .perfect-score-text {
            background: linear-gradient(45deg, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        /* --- 动画定义 --- */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .confetti {
            position: absolute;
            width: 12px; height: 12px;
            background-color: #f00;
            border-radius: 3px;
            animation: fall linear forwards;
            z-index: 10;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="game-container">
        <div id="quiz-view">
            <div class="header-stats">
                <span id="level-indicator">Level 1 / 20</span>
                <div class="score-box">⭐ <span id="score">0</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>

            <div class="question-area" id="question-container">
            </div>

            <div class="options-grid" id="options-container">
            </div>

            <div class="feedback-section" id="feedback-area">
                <div class="feedback-title" id="feedback-title"></div>
                <div class="explanation-text" id="explanation-text"></div>
                <div style="overflow: hidden;"> 
                    <button class="next-btn" onclick="nextQuestion()">下一题 ➔</button>
                </div>
            </div>
        </div>

        <div id="end-screen" class="end-screen">
        </div>
    </div>

    <script>
        // --- 题目数据 ---
        const quizData = [
            {
                qZh: "1. 在 Python 中，下面哪一项是合法的字符串？",
                qEn: "Which of the following is a valid string in Python?",
                options: [
                    { zh: "A.", en: "", code: "Brak" },
                    { zh: "B.", en: "", code: "\"Brak\"" },
                    { zh: "C.", en: "", code: "(Brak)" },
                    { zh: "D.", en: "", code: "[Brak]" }
                ],
                correct: 1, 
                descZh: "解析：字符串必须用引号（双引号或单引号）包围，`\"Brak\"` 是字符串。不加引号的 `Brak` 会被当作变量名，而圆括号或方括号不能用于表示字符串。",
                descEn: "Explanation: Strings must be enclosed in quotes (double or single). `\"Brak\"` is a string. `Brak` without quotes is treated as a variable name, and parentheses or brackets cannot be used to define strings."
            },
            {
                qZh: "2. 下面哪种说法正确描述了注释的作用？",
                qEn: "Which statement correctly describes the purpose of comments?",
                options: [
                    { zh: "A. 让程序运行得更快", en: "To make the program run faster" },
                    { zh: "B. 向计算机解释如何执行代码", en: "To explain to the computer how to execute the code" },
                    { zh: "C. 给人看但不会被执行的解释文字", en: "Explanatory text for humans that is not executed" },
                    { zh: "D. 一种特殊的字符串类型", en: "A special type of string" }
                ],
                correct: 2,
                descZh: "解析：注释以 `#` 开头，用于向程序员解释代码意图，计算机在运行时完全忽略注释内容。注释不会影响程序运行速度，也不是字符串。",
                descEn: "Explanation: Comments start with `#` and explain code intentions to programmers. The computer completely ignores them during execution. They don't affect speed and are not strings."
            },
            {
                qZh: "3. 下列哪行代码可以正确攻击名为 “Krug” 的敌人？",
                qEn: "Which line of code correctly attacks an enemy named “Krug”?",
                options: [
                    { zh: "A.", en: "", code: "hero.attack(Krug)" },
                    { zh: "B.", en: "", code: "hero.attack(\"Krug\")" },
                    { zh: "C.", en: "", code: "hero.attack('Krug)" },
                    { zh: "D.", en: "", code: "hero.attack[\"Krug\"]" }
                ],
                correct: 1,
                descZh: "解析：`attack()` 方法的参数必须是字符串（用引号包围）。选项 A 缺少引号，会被当作变量名；选项 C 的引号不配对；选项 D 使用了方括号，语法错误。",
                descEn: "Explanation: The `attack()` method requires a string parameter (enclosed in quotes). Option A lacks quotes, C has mismatched quotes, and D uses brackets which is a syntax error."
            },
            {
                qZh: "4. 字符串 `\"Brak\"` 和 `\"brak\"` 在 Python 中是什么关系？",
                qEn: "In Python, what is the relationship between the strings `\"Brak\"` and `\"brak\"`?",
                options: [
                    { zh: "A. 完全相同的字符串", en: "Exactly the same string" },
                    { zh: "B. 不同的字符串，因为大小写敏感", en: "Different strings because Python is case-sensitive" },
                    { zh: "C. 相同的字符串，因为 Python 忽略大小写", en: "The same string because Python ignores case" },
                    { zh: "D. 它们会引发语法错误", en: "They cause a syntax error" }
                ],
                correct: 1,
                descZh: "解析：Python 对字符串比较是大小写敏感的，`\"Brak\"` 和 `\"brak\"` 因为首字母大小写不同而被视为两个不同的字符串。攻击时必须写对名字的大小写。",
                descEn: "Explanation: Python is case-sensitive when comparing strings. `\"Brak\"` and `\"brak\"` are treated as different strings due to the capitalization of the first letter."
            },
            {
                qZh: "5. 在 `hero.attack(\"Treg\")` 中，`\"Treg\"` 是什么？",
                qEn: "In `hero.attack(\"Treg\")`, what is `\"Treg\"`?",
                options: [
                    { zh: "A. 方法名", en: "Method name" },
                    { zh: "B. 整数参数", en: "An integer argument" },
                    { zh: "C. 字符串参数", en: "A string argument" },
                    { zh: "D. 对象名", en: "Object name" }
                ],
                correct: 2,
                descZh: "解析：`\"Treg\"` 是传给 `attack()` 方法的字符串参数，指定要攻击的敌人名称。参数类型是字符串，不是整数或对象名。",
                descEn: "Explanation: `\"Treg\"` is a string argument passed to the `attack()` method, specifying the enemy's name. It is a string, not an integer or object name."
            },
            {
                qZh: "6. 下面哪种情况会产生语法错误？",
                qEn: "Which of the following will cause a syntax error?",
                options: [
                    { zh: "A.", en: "", code: "hero.moveRight(2)" },
                    { zh: "B.", en: "", code: "hero.say(\"Hello\")" },
                    { zh: "C.", en: "", code: "hero.attack(\"Brak\")" },
                    { zh: "D.", en: "", code: "hero.attack(\"Brak)" }
                ],
                correct: 3,
                descZh: "解析：选项 D 的字符串缺少结尾双引号，导致引号不配对，违反 Python 语法规则，会引发语法错误。其他选项的语法都是正确的。",
                descEn: "Explanation: Option D is missing the closing double quote, resulting in mismatched quotes. This violates Python's syntax rules and causes a syntax error."
            },
            {
                qZh: "7. 以下哪一项最准确地描述了 `hero.say(\"Hello\")` 的功能？",
                qEn: "Which of the following most accurately describes the function of `hero.say(\"Hello\")`?",
                options: [
                    { zh: "A. 让英雄攻击名为 Hello 的敌人", en: "Makes the hero attack an enemy named Hello" },
                    { zh: "B. 在游戏画面中显示英雄的对话气泡", en: "Displays a speech bubble above the hero in the game" },
                    { zh: "C. 向控制台打印调试信息", en: "Prints debug information to the console" },
                    { zh: "D. 让英雄回复生命值", en: "Restores the hero's health" }
                ],
                correct: 1,
                descZh: "解析：`hero.say()` 方法使英雄在游戏画面中说出指定的字符串内容，以对话气泡形式展现。它不是攻击指令，也不直接打印到控制台。",
                descEn: "Explanation: The `hero.say()` method makes the hero say the specified string, displayed as a speech bubble in the game. It is not an attack command."
            },
            {
                qZh: "8. 在调试程序时，“小黄鸭调试法”是指什么？",
                qEn: "What is “rubber duck debugging”?",
                options: [
                    { zh: "A. 让一只鸭子帮你写代码", en: "Letting a duck write code for you" },
                    { zh: "B. 通过逐行向小黄鸭（或任何物品）解释代码来发现错误", en: "Explaining code line by line to a rubber duck (or any object) to find errors" },
                    { zh: "C. 反复运行代码直到错误消失", en: "Running the code repeatedly until the error disappears" },
                    { zh: "D. 使用特殊软件自动修复 Bug", en: "Using special software to automatically fix bugs" }
                ],
                correct: 1,
                descZh: "解析：小黄鸭调试法是一种通过向他人（或物品）详细解释代码逻辑，从而自己发现问题所在的调试技巧。它不是自动化工具，也不需要反复盲目运行。",
                descEn: "Explanation: Rubber duck debugging is a technique where you explain your code logic in detail to someone (or an object) to discover the problem yourself."
            },
            {
                qZh: "9. 下面哪个是正确的方法调用？",
                qEn: "Which of the following is a correct method call?",
                options: [
                    { zh: "A.", en: "", code: "hero.attack \"Brak\"" },
                    { zh: "B.", en: "", code: "hero.attack(\"Brak\")" },
                    { zh: "C.", en: "", code: "hero.attack(Brak)" },
                    { zh: "D.", en: "", code: "hero attack(\"Brak\")" }
                ],
                correct: 1,
                descZh: "解析：正确的方法调用必须使用圆括号包含参数，即 `hero.attack(\"Brak\")`。选项 A 缺少圆括号；选项 C 的参数没有引号；选项 D 缺少点号。",
                descEn: "Explanation: A correct method call must use parentheses to enclose arguments. Option A lacks parentheses; C lacks quotes for the string; D is missing the dot."
            },
            {
                qZh: "10. 注释 `#` 后面的内容会怎样？",
                qEn: "What happens to the content after the `#` symbol?",
                options: [
                    { zh: "A. 会被当作代码执行", en: "It is executed as code" },
                    { zh: "B. 会被计算机忽略", en: "It is ignored by the computer" },
                    { zh: "C. 会被转换为字符串", en: "It is converted into a string" },
                    { zh: "D. 会在运行时弹出警告", en: "It triggers a warning at runtime" }
                ],
                correct: 1,
                descZh: "解析：`#` 是 Python 的单行注释符号，从 `#` 开始到行尾的所有内容都会被解释器忽略，不会执行。",
                descEn: "Explanation: `#` is Python's single-line comment symbol. Everything from the `#` to the end of the line is ignored by the interpreter and not executed."
            },
            {
                qZh: "11. 在 Python 中，不带引号的 `hero` 通常表示什么？",
                qEn: "In Python, what does the unquoted `hero` usually represent?",
                options: [
                    { zh: "A. 一个字符串", en: "A string" },
                    { zh: "B. 一个对象或变量的名字", en: "An object or variable name" },
                    { zh: "C. 一个数字", en: "A number" },
                    { zh: "D. 一个注释", en: "A comment" }
                ],
                correct: 1,
                descZh: "解析：不加引号的 `hero` 是一个标识符，代表名为 `hero` 的对象。加上引号 `\"hero\"` 才是字符串。这是字符串与标识符的关键区别。",
                descEn: "Explanation: An unquoted `hero` is an identifier representing an object named `hero`. Adding quotes `\"hero\"` makes it a string."
            },
            {
                qZh: "12. 以下哪种错误类型表示代码写法不符合 Python 语法规则，导致程序无法启动？",
                qEn: "Which error type indicates that the code violates Python’s syntax rules and the program cannot start?",
                options: [
                    { zh: "A. 运行时错误", en: "Runtime error" },
                    { zh: "B. 逻辑错误", en: "Logic error" },
                    { zh: "C. 语法错误", en: "Syntax error" },
                    { zh: "D. 类型错误", en: "Type error" }
                ],
                correct: 2,
                descZh: "解析：语法错误是由于代码不符合语言规则（如缺引号、括号不配对）导致程序无法被解释器解析，无法启动运行。",
                descEn: "Explanation: Syntax errors occur when code breaks language rules (like missing quotes or parentheses), preventing the interpreter from parsing and starting the program."
            },
            {
                qZh: "13. 在第 8 关“危险脚步”中，为什么一个食人魔需要被 `attack` 两次？",
                qEn: "In the level \"Dangerous Steps\", why does an ogre need to be attacked twice?",
                options: [
                    { zh: "A. 因为英雄的武器攻击力不够", en: "Because the hero’s weapon doesn’t deal enough damage" },
                    { zh: "B. 因为英雄每次攻击两个目标", en: "Because the hero attacks two targets at once" },
                    { zh: "C. 因为第一次攻击是警告", en: "Because the first attack is a warning" },
                    { zh: "D. 因为代码有 Bug", en: "Because there is a bug in the code" }
                ],
                correct: 0,
                descZh: "解析：在地牢关卡中，英雄使用的普通剑攻击力较低，每个食人魔矮人都需要两次攻击才能被消灭。这是游戏设定，而不是代码错误。",
                descEn: "Explanation: In the dungeon levels, the hero's basic sword has low attack power, so it takes two hits to defeat a munchkin ogre. This is game design, not a bug."
            },
            {
                qZh: "14. 下面哪一项是编写注释的最佳实践？",
                qEn: "Which of the following is a best practice for writing comments?",
                options: [
                    { zh: "A. 每行代码都必须写注释", en: "Every line of code must have a comment" },
                    { zh: "B. 用注释解释代码为什么这样写，而不是重复代码内容", en: "Explain why the code is written this way, not what it does" },
                    { zh: "C. 注释使用与代码完全相同的语言", en: "Comments should be written in the same language as the code" },
                    { zh: "D. 在程序完成后删除所有注释", en: "Delete all comments after the program is finished" }
                ],
                correct: 1,
                descZh: "解析：好的注释应该解释代码的意图和原因（“为什么”），而不是简单地复述代码本身（“做什么”）。每行都写注释或删除所有注释都不是好的做法。",
                descEn: "Explanation: Good comments explain the intent and reasoning (\"why\") behind the code, rather than simply repeating what the code does."
            },
            {
                qZh: "15. 以下关于 Python 解释器的描述，哪一项是正确的？",
                qEn: "Which description of the Python interpreter is correct?",
                options: [
                    { zh: "A. 它先把全部代码编译完再执行", en: "It compiles all code before execution" },
                    { zh: "B. 它逐行读取、翻译并执行代码", en: "It reads, translates, and executes code line by line" },
                    { zh: "C. 它只能运行游戏程序", en: "It can only run game programs" },
                    { zh: "D. 它不需要任何代码就能运行", en: "It can run without any code" }
                ],
                correct: 1,
                descZh: "解析：Python 是解释型语言，解释器逐行读取源代码、翻译并立即执行，而不是像编译型语言那样先完整编译。",
                descEn: "Explanation: Python is an interpreted language. The interpreter reads, translates, and executes the source code line by line, unlike compiled languages."
            },
            {
                qZh: "16. 在 Python 中，`\"3\"` 和 `3` 有什么区别？",
                qEn: "In Python, what is the difference between `\"3\"` and `3`?",
                options: [
                    { zh: "A. 没有区别", en: "There is no difference" },
                    { zh: "B. `\"3\"` 是字符串，`3` 是整数", en: "`\"3\"` is a string, `3` is an integer" },
                    { zh: "C. `\"3\"` 是整数，`3` 是字符串", en: "`\"3\"` is an integer, `3` is a string" },
                    { zh: "D. 两者都是字符串", en: "Both are strings" }
                ],
                correct: 1,
                descZh: "解析：加引号的 `\"3\"` 是字符串类型（str），不加引号的 `3` 是整数类型（int）。它们的数据类型完全不同，不能混用。",
                descEn: "Explanation: The quoted `\"3\"` is a string (text), while the unquoted `3` is an integer (number). They are different data types and cannot be mixed."
            },
            {
                qZh: "17. 在调试五步法中，发现 Bug 后，下一步应该做什么？",
                qEn: "In the five-step debugging process, after discovering a bug, what should you do next?",
                options: [
                    { zh: "A. 立即修复它", en: "Fix it immediately" },
                    { zh: "B. 定位问题所在的行", en: "Locate the line where the problem occurs" },
                    { zh: "C. 重写整个程序", en: "Rewrite the entire program" },
                    { zh: "D. 运行程序看它是否再次发生", en: "Run the program to see if it happens again" }
                ],
                correct: 1,
                descZh: "解析：调试五步法是：发现 → 定位 → 分析 → 修复 → 验证。发现 Bug 后，下一步是定位错误发生在哪一行，而不是马上修改或重写。",
                descEn: "Explanation: The 5 steps are: Discover → Locate → Analyze → Fix → Verify. After discovering a bug, the next step is locating the specific line, not immediately fixing it."
            },
            {
                qZh: "18. 在 `hero.moveRight(2)` 中，`2` 作为参数的作用是什么？",
                qEn: "What is the role of `2` as an argument in `hero.moveRight(2)`?",
                options: [
                    { zh: "A. 指定移动的目标名称", en: "Specifies the name of the movement target" },
                    { zh: "B. 指定向右移动的步数", en: "Specifies the number of steps to move right" },
                    { zh: "C. 指定英雄的编号", en: "Specifies the hero’s ID number" },
                    { zh: "D. 指定攻击力的大小", en: "Specifies the attack power" }
                ],
                correct: 1,
                descZh: "解析：在移动方法中，数字参数表示移动的步数。`hero.moveRight(2)` 表示向右移动 2 步。",
                descEn: "Explanation: In movement methods, the numeric argument represents the number of steps. `hero.moveRight(2)` means moving right by 2 steps."
            },
            {
                qZh: "19. 下列哪一项属于逻辑错误？",
                qEn: "Which of the following is a logic error?",
                options: [
                    { zh: "A.", en: "Writing `hero.atack(\"Brak\")` instead of `hero.attack(\"Brak\")`", code: "将 hero.attack(\"Brak\") 写成 hero.atack(\"Brak\")" },
                    { zh: "B. 字符串忘记加引号", en: "Forgetting quotes around a string" },
                    { zh: "C. 只攻击了敌人一次就移动离开，导致被反击失败", en: "Attacking an enemy only once before moving away, leading to failure" },
                    { zh: "D. 缺少右括号", en: "Missing a closing parenthesis" }
                ],
                correct: 2,
                descZh: "解析：逻辑错误是指代码能正常运行，但结果不符合预期。只攻击一次就离开是典型的逻辑错误。其他选项属于语法错误或运行时错误。",
                descEn: "Explanation: A logic error means the code runs without crashing, but produces the wrong result. Attacking only once and leaving is a classic logic error."
            },
            {
                qZh: "20. 所有复杂的计算机程序都是由哪三种基本控制结构组合而成的？",
                qEn: "All complex computer programs are built from combinations of which three basic control structures?",
                options: [
                    { zh: "A. 移动、攻击、说话", en: "Move, attack, say" },
                    { zh: "B. 顺序、选择、循环", en: "Sequence, selection, iteration" },
                    { zh: "C. 输入、处理、输出", en: "Input, processing, output" },
                    { zh: "D. 整数、浮点数、字符串", en: "Integer, float, string" }
                ],
                correct: 1,
                descZh: "解析：顺序结构、选择结构（条件判断）和循环结构是构成所有算法的三种基本控制结构，这是 AP CSP 等计算机科学课程的核心概念。",
                descEn: "Explanation: Sequence, selection (conditionals), and iteration (loops) are the three fundamental control structures used to build all algorithms."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false; 

        const quizView = document.getElementById('quiz-view');
        const endScreen = document.getElementById('end-screen');
        const questionContainer = document.getElementById('question-container');
        const optionsContainer = document.getElementById('options-container');
        const levelIndicator = document.getElementById('level-indicator');
        const scoreDisplay = document.getElementById('score');
        const progressBar = document.getElementById('progress-bar');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const explanationText = document.getElementById('explanation-text');

        // --- 取消错误正则，仅作转义处理，保证格式绝对正确 ---
        function highlightCode(codeStr) {
            if (!codeStr) return '';
            return escapeHtml(codeStr);
        }

        function loadQuestion() {
            answered = false; 
            feedbackArea.style.display = 'none'; 
            
            const data = quizData[currentQuestion];
            
            levelIndicator.innerText = `Level ${currentQuestion + 1} / ${quizData.length}`;
            progressBar.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            scoreDisplay.innerText = score;
            
            let html = `
                <div class="question-title">${highlightDescCode(data.qZh)}</div>
                <div class="en-text">${highlightDescCode(data.qEn)}</div>
            `;
            questionContainer.innerHTML = html;
            
            optionsContainer.innerHTML = '';
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                
                let btnHtml = `<span class="opt-zh">${highlightDescCode(opt.zh)}</span>`;
                if (opt.en) {
                    btnHtml += `<span class="opt-en">${highlightDescCode(opt.en)}</span>`;
                }
                if (opt.code) {
                    btnHtml += `<div class="option-code">${highlightCode(opt.code)}</div>`;
                }

                btn.innerHTML = btnHtml;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return; 
            answered = true;

            const data = quizData[currentQuestion];
            const allBtns = optionsContainer.querySelectorAll('.option-btn');
            
            allBtns.forEach(btn => btn.setAttribute('disabled', 'true'));
            
            const fullDesc = `
                <div style="margin-bottom:8px;">${highlightDescCode(data.descZh)}</div>
                <div class="en-text">${highlightDescCode(data.descEn)}</div>
            `;

            if (selectedIndex === data.correct) {
                btnElement.classList.add('correct');
                score += 100; 
                scoreDisplay.innerText = score;
                createConfetti(); 
                showFeedback(true, "🎉 回答正确！ Correct!", fullDesc);
            } else {
                btnElement.classList.add('wrong');
                setTimeout(() => {
                   allBtns[data.correct].classList.add('correct');
                }, 400);
                
                const rightOptStr = String.fromCharCode(65 + data.correct); 
                showFeedback(false, `❌ 回答错误。正确答案是 / Correct answer is: ${rightOptStr}`, fullDesc);
            }
        }

        function highlightDescCode(text) {
            return text.replace(/`([^`]+)`/g, '<span style="background:rgba(0,0,0,0.06); padding:2px 6px; border-radius:4px; font-family:monospace; color:#0984e3;">$1</span>');
        }

        function showFeedback(isCorrect, title, desc) {
            feedbackArea.classList.remove('correct', 'wrong');
            feedbackArea.classList.add(isCorrect ? 'correct' : 'wrong');
            feedbackTitle.innerHTML = title;
            explanationText.innerHTML = desc;
            feedbackArea.style.display = 'block';
            setTimeout(() => {
                feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            quizView.style.display = 'none';
            endScreen.style.display = 'block';
            progressBar.parentElement.style.display = 'none'; 

            const totalScore = quizData.length * 100;
            const isPerfect = (score === totalScore);
            
            let html = '';
            if (isPerfect) {
                for(let i=0; i<6; i++) setTimeout(createConfetti, i*350);
                html += `<div class="end-title">🎉 完美的编程小英雄！<br><span class="en-text" style="font-size: 1.2rem;">Perfect Programming Hero!</span>🎉</div>`;
                html += `<div class="end-score-box">总得分 Total Score<br><div class="end-score perfect-score-text">${score}</div></div>`;
                html += `<div class="end-desc">太棒了！你掌握了所有的知识点，简直是天才！<br><span class="en-text">Amazing! You've mastered all the concepts, you're a genius!</span></div>`;
            } else {
                html += `<div class="end-title">挑战完成！<br><span class="en-text" style="font-size: 1.2rem;">Challenge Completed!</span></div>`;
                html += `<div class="end-score-box">总得分 Total Score<br><div class="end-score">${score} / ${totalScore}</div></div>`;
                html += `<div class="end-desc">做得不错！继续加油，下次争取拿满分哦！<br><span class="en-text">Good job! Keep it up and aim for a perfect score next time!</span></div>`;
            }
            html += `<button class="next-btn" onclick="location.reload()" style="float:none; font-size:1.2rem; padding: 15px 40px; margin-top:20px;">🔄 再玩一次 Play Again</button>`;
            
            endScreen.innerHTML = html;
        }

        function createConfetti() {
            const colors = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7', '#a29bfe', '#fdcb6e'];
            const container = document.querySelector('.game-container');
            for (let i = 0; i < 45; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-20px';
                const scale = Math.random() * 0.6 + 0.4;
                confetti.style.transform = `scale(${scale}) rotate(${Math.random()*360}deg)`;
                confetti.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                
                container.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        loadQuestion();
    </script>
</body>
</html>
